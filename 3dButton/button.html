<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		html, body{
			width: 100%;
			height: 100%;
		}
		*{
			box-sizing: border-box;
		}
		:root{
			--bg-color: #fe858c;
			--text-color: #fce7bf;
			--size: 2rem;
		}
		body{
			display: flex;
			align-items: center;
			justify-content: center;
		}


		.btn3d{
			background-color: var(--bg-color);
			color: var(--text-color);
			font-size: var(--size);
			padding: 1% 2%;
			border-radius: 10px;
			border: none;
			box-shadow: inset -4px -4px 4px -2px #fbe9be;
			position: relative;
			z-index: 1;
			transition: box-shadow 500ms ease;
			overflow:visible;
			cursor: pointer;
		}
		.btn3d:hover{
			box-shadow: 3px 3px 10px -1px rgba(134, 69, 72, 0.5), inset -4px -4px 4px -2px #fbe9be;
		}
		.btn3d:active{
			box-shadow: 3px 3px 10px -1px rgba(134, 69, 72, 0.2),inset -4px -4px 4px -2px #fbe9be;
		}
		.btn3d::after{
			content: "";
			border: 1px solid red;
			display: inline-block;
			width: 100%;
			height: 100%;
			position: absolute;
			top : 7%;
			left : 4%;
			border-radius: inherit;
			background-color: var(--bg-color);
			box-shadow: 3px 3px 10px -1px rgba(134, 69, 72, 0.74);
			z-index: -1;
		}
	</style>
</head>
<body>
	<button type="button" value="button" class="btn3d"> Button </button>
<script>

</script>
</body>
</html>
