<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tactile Keyboard Button </title>
	<style>
		:root{
			--width:10rem;
			--height:5rem;

			--paddingX:calc(var(--width) * .1);

			--paddingY:calc(var(--height) * .1);

			--border-radius:calc(var(--width) * .05);

			--box-shadow : calc(var(--width) * -0.08) 0 calc(var(--width) * 0.08) rgba(0,0,0, 0.15),
							calc(var(--width) * 0.05) calc(var(--width) * 0.1) calc(var(--width) * 0.15) rgba(0, 0,0, 0.5),
							0 0 0 1px rgba(0,0,0, 0.5);
			--font-size: calc(min(var(--width), var(--height)) * 0.5);
		}
		*{
			margin: 0;
			padding:0;
			box-sizing: border-box;
		}
		body, html {
			width: 100%;
			height: 100%;
		}
		body{
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			background: gray;
		}
		.grid{
			display: grid;
			grid-template-columns: repeat(minmax(4rem, 4rem));
		}
		.key3d{
			position: relative;
			display: inline-block;
			width: var(--width);
			height: var(--height);
			padding: var(--paddingY) var(--paddingX);
			border-radius: var(--border-radius);
			/* overflow: hidden; */
			background: linear-gradient( 135deg, #fff, #d3d3d3);
			box-shadow: inset var(--box-shadow);
			z-index: 0;
			font-size: var(--font-size);
			text-align: center;

			transition:
			transform .12s cubic-bezier(.2,.8,.3,1),
			box-shadow .12s ease,
			color .12s ease;
			will-change:transform;
			user-select: none;
		}
		.key3d::before{
			content: "";
			position: absolute;
			top: 5px;
			left: 4px;
			bottom: 13px;
			right: 13px;
			background: linear-gradient(135deg, #d3d3d3, #fff);
			border-radius: 8px;
			box-shadow: -5px -5px 5px rgba(255, 255, 255, 0.25),
						10px 5px 10px rgba(0, 0, 0, 0.15),
						0 0 0 1px rgba(255, 255, 255, 0.25);
						z-index: -1;
			transition:
				transform .12s cubic-bezier(.2,.8,.3,1),
				box-shadow .12s ease;
			
		}

		 .key3d:hover::before{
			bottom: 12px;
			right: 11px;
		 }
		 .key3d:hover{
			transform:translateY(-1px);
		 }
		 .key3d:active::before{

			transform:translate(4px,4px);
			box-shadow:
			-2px -2px 3px rgba(255,255,255,.2),
			4px 3px 5px rgba(0,0,0,.12);
		 }
		 .key3d:active{
			transform:translateY(5px);
			color: green;
			text-shadow: 0px 0px 3px rgba(0, 128, 0, 0.4);
		 }
	</style>
</head>
<body>
	<div class="key3d">Enter</div>
</body>
</html>
