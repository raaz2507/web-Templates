<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Emoji to png</title>
	<style>
		html, body{
			width: 100%;
			height: 100%;
		}
		*{
			box-sizing: border-box;
		}
		.canvasContainer{
			width: 500px;
			height: 500px;
			border:  1px solid rgb(128, 128, 128);
		}
	</style>
	<style>
		body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a; /* dark blue */
        color: #fff;

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        backdrop-filter: blur(2px);
    }

/* container */
.canvasContainer {
    background: #1e293b;
    padding: 5px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* canvas */
canvas {
    background: #ffffff;
    border-radius: 10px;
    display: block;
    width:100%;
    height: 100%;
}

/* settings panel */
.setting {
    margin-left: 20px;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 220px;

    display: flex;
    flex-direction: column;
    gap: 15px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* labels */
.setting label {
    font-size: 14px;
    margin-bottom: 4px;
    display: block;
    color: #cbd5e1;
}

/* inputs */
.setting input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    outline: none;

    background: #0f172a;
    color: white;

    transition: 0.2s;
}

.setting input:focus {
    box-shadow: 0 0 0 2px #38bdf8;
}

/* button */
button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    font-weight: bold;
    cursor: pointer;

    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(99,102,241,0.4);
}

button:active {
    transform: scale(0.98);
}
	</style>
</head>
<body>
	<div class="canvasContainer">
		<canvas id="c" width="256" height="256"></canvas>
	</div>
	<div class = 'setting'>
		<div>
			<label for="emoji">Emoji</label>
			<input type="text" name="emoji" id="emoji" value = "🐦‍🔥" placeholder="Enter emoji">
		</div>
		<div>
			<label for="emoji_size">Enter Size</label>
			<input type="text" name="emojiSize" id="emoji_size" list="emojiSize">
			<datalist id="emojiSize">
				<option value="256">256</option>
				<option value="500">500</option>
				<option value="1000">1000</option>
			</datalist>
		</div>
		<button onclick="downloadPNG()">Download PNG</button>
	</div>

	
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const emojiInput = document.getElementById('emoji');
const emojiSize = document.getElementById('emoji_size');

// 🎯 draw function (central logic)
function drawEmoji(emoji, size) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.font = `${size * 0.7}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(emoji, canvas.width / 2, canvas.height / 2);
}

// default draw
drawEmoji(emojiInput.value, canvas.width);

// 🔄 emoji change
emojiInput.addEventListener('input', (e) => {
    drawEmoji(e.target.value, canvas.width);
});

// 🔄 size change
let size = canvas.width;
emojiSize.addEventListener('input', (e) => {
    size = parseInt(e.target.value) || 256;

    canvas.width = size;
    canvas.height = size;

    drawEmoji(emojiInput.value, size);
});

// ⬇️ download
function downloadPNG(){
    let inputName = prompt("Enter File Name")
        ?.replace(/[\\/:*?"<>|]/g, "")
        .trim();

    const fileName = inputName ? inputName + ` (${size}x${size}).png` : `emoji (${size}x${size}).png`;

    const link = document.createElement("a");
    link.download = fileName;
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>
</body>
</html>
